name: Build Static PRoot for Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, x86_64]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27

      - name: Install dependencies
        run: sudo apt-get install -y wget git make

      - name: Build PRoot
        run: |
          chmod +x app/proot-builder/build-proot.sh
          cd app/proot-builder
          bash build-proot.sh ${{ steps.setup-ndk.outputs.ndk-path }} ${{ matrix.abi }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: proot-${{ matrix.abi }}
          path: app/src/main/assets/bin/${{ matrix.abi }}/proot

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
